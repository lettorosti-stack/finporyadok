plugins {
    id "com.android.application"
}

android {
    namespace "ru.finporyadok.app"
    compileSdk 35

    defaultConfig {
        applicationId "ru.finporyadok.app"
        minSdk 23
        targetSdk 35
        versionCode 11
        versionName "0.6.3"
    }
}

dependencies {
    implementation "com.google.android.gms:play-services-code-scanner:16.1.0"
}

tasks.register("syncWebAssets", Copy) {
    from(rootProject.projectDir) {
        include "index.html"
        include "styles.css"
        include "app.js"
        include "andromoney-data.js"
        include "manifest.webmanifest"
        include "favicon.ico"
        include "assets/**"
        include "icons/**"
    }
    into layout.projectDirectory.dir("src/main/assets/www")
}

preBuild.dependsOn("syncWebAssets")
