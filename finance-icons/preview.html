<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Finance Icons</title><style>
:root{font-family:Inter,system-ui,sans-serif;color:#172033;background:#f4f6fa}*{box-sizing:border-box}body{margin:0;padding:40px}.wrap{max-width:1120px;margin:auto}h1{margin:0 0 8px;font-size:32px}.sub{margin:0 0 32px;color:#64748b}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}.card{display:flex;align-items:center;gap:14px;padding:14px;background:white;border:1px solid #e5e9f0;border-radius:16px;box-shadow:0 1px 2px #0f172a0a}.icon{display:grid;place-items:center;width:46px;height:46px;border-radius:14px;background:color-mix(in srgb,var(--c) 12%,white);color:var(--c);flex:0 0 auto}.icon svg{width:26px;height:26px}.name{font-size:14px;font-weight:650}.id{margin-top:3px;font:11px ui-monospace,monospace;color:#94a3b8}@media(max-width:600px){body{padding:20px}.grid{grid-template-columns:1fr}}
</style></head><body><main class="wrap"><h1>Finance Icons</h1><p class="sub">39 категорий · сетка 24×24 · единый контурный стиль</p><section class="grid" id="grid"></section></main><script>
fetch('./categories.json').then(r=>r.json()).then(items=>{document.querySelector('#grid').innerHTML=items.map(x=>`<article class="card" style="--c:${x.color}"><span class="icon"><svg aria-hidden="true"><use href="./finance-icons.svg#fi-${x.id}"></use></svg></span><span><div class="name">${x.label}</div><div class="id">${x.id}</div></span></article>`).join('')})
</script></body></html>
