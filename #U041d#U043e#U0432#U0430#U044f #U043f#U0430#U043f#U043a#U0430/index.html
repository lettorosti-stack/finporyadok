<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Красота внутри и снаружи</title>
<style>
:root{--bg:#fff8f5;--card:#fffdfb;--text:#56443e;--muted:#94837b;--line:#f0e1da;--accent:#d992aa;--accent2:#b96f8d;--soft:#f9e7ed;--ok:#72a58e;--warn:#d69a68;--danger:#c86c79;--shadow:0 14px 36px rgba(201,148,166,.15)}
body.theme-night{--bg:#17151b;--card:#232029;--text:#f7ece6;--muted:#baa9a3;--line:#38313c;--accent:#e8a7b9;--accent2:#f0c0cf;--soft:#302935;--shadow:0 18px 48px rgba(0,0,0,.34)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}button,input,textarea,select{font:inherit;color:inherit}.app{max-width:430px;margin:auto;min-height:100vh;padding-bottom:100px}.page{display:none}.page.active{display:block}.top,.header{padding:18px 16px 12px}.section{padding:0 16px 16px}.card,.tile,.sheet{background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:26px}.card{padding:15px}.tile{padding:12px;cursor:pointer;overflow:hidden}.space{display:flex;justify-content:space-between;align-items:center;gap:10px}.row{display:flex;gap:10px;align-items:center}.grow{flex:1}.small{font-size:13px;color:var(--muted);line-height:1.35}h1{font-size:26px;margin:4px 0}h2{font-size:18px;margin:0 0 11px}h3{font-size:16px;margin:7px 0 4px}.avatar{width:48px;height:48px;border-radius:16px;background:var(--soft);display:grid;place-items:center;font-weight:700}.progress{height:9px;border-radius:99px;background:var(--soft);overflow:hidden;margin-top:8px}.progress span{display:block;height:100%;background:var(--accent);transition:.3s}.hero{display:flex;gap:12px;align-items:center;overflow:hidden}.heroIcon{width:100px;height:100px;object-fit:contain;flex:none}.icon{width:78px;height:78px;object-fit:contain;display:block;margin:auto}.icon.sm{width:58px;height:58px;margin:0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}.tile{text-align:center}.tile p{font-size:13px;color:var(--muted);line-height:1.35;margin:0}.taskGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}.taskCard{background:var(--card);border:1px solid var(--line);border-radius:23px;padding:10px;text-align:center;cursor:pointer;overflow:hidden}.taskCard img{width:82px;height:82px;object-fit:contain;display:block;margin:auto}.taskCard b{display:block;font-size:14px;margin-top:3px}.taskCard span{font-size:12px;color:var(--muted)}.chips{display:flex;gap:7px;overflow:auto;margin-top:9px}.chip,.badge{white-space:nowrap;padding:7px 10px;border-radius:999px;background:var(--soft);font-size:12px;border:0}.badge.ok{background:#e5f2eb;color:#4d7c67}.badge.warn{background:#fff0df;color:#9a6331}.badge.danger{background:#fde7ea;color:#9d4e5b}.bottom{position:fixed;bottom:9px;left:50%;transform:translateX(-50%);width:min(420px,calc(100vw - 18px));display:flex;gap:4px;padding:8px;background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:25px;z-index:20}.nav{flex:1;text-align:center;font-size:10px;color:var(--muted);cursor:pointer;min-width:0}.nav img{width:42px;height:42px;object-fit:contain;display:block;margin:-3px auto -1px}.nav.active{font-weight:700;color:var(--text)}.primary,.secondary,.dangerBtn{width:100%;padding:12px;border-radius:16px;font-weight:700;cursor:pointer}.primary{border:0;background:var(--accent);color:white}.secondary{background:var(--card);border:1px solid var(--line)}.dangerBtn{background:#fff0f1;border:1px solid #f2ccd1;color:#9a4c58}.toolbar{display:flex;gap:8px;margin-top:10px}.toolbar>*{flex:1}.input,.search,select,textarea,input[type=date],input[type=time],input[type=number],input[type=text]{width:100%;border:1px solid var(--line);background:var(--card);padding:11px 12px;border-radius:15px;outline:none}.search{margin-top:10px}.list{display:grid;gap:9px}.item{display:flex;gap:10px;align-items:center;padding:11px;border:1px solid var(--line);background:var(--card);border-radius:18px}.item img{width:54px;height:54px;object-fit:contain;flex:none}.item b{display:block;font-size:14px}.item .actions{display:flex;gap:5px}.mini{border:1px solid var(--line);background:var(--soft);border-radius:11px;padding:6px 8px;cursor:pointer}.check{width:25px;height:25px;border:2px solid var(--accent);border-radius:8px;display:grid;place-items:center;flex:none;cursor:pointer}.check.done{background:var(--ok);border-color:var(--ok);color:#fff}.tabs{display:flex;gap:7px;overflow:auto;padding-bottom:4px}.tab{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:8px 11px;white-space:nowrap;cursor:pointer}.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.kpi{text-align:center;padding:11px 5px;border-radius:17px;background:var(--card);border:1px solid var(--line)}.kpi b{display:block;font-size:18px}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}.day{aspect-ratio:1;border:1px solid var(--line);border-radius:11px;padding:5px;font-size:12px;background:var(--card);position:relative;cursor:pointer}.day.active{outline:2px solid var(--accent)}.day.has::after{content:'';width:7px;height:7px;background:var(--accent);border-radius:50%;position:absolute;right:5px;bottom:5px}.metric{padding:11px;border-radius:18px;background:var(--card);border:1px solid var(--line)}.metric b{font-size:20px;display:block}.water{display:flex;gap:5px;flex-wrap:wrap}.drop{width:34px;height:34px;border-radius:50% 50% 50% 15%;transform:rotate(45deg);border:2px solid var(--accent);cursor:pointer}.drop.filled{background:var(--accent)}.drop span{display:block;transform:rotate(-45deg);font-size:10px;text-align:center;margin-top:8px}.modal{position:fixed;inset:0;background:rgba(60,43,48,.35);display:none;align-items:flex-end;justify-content:center;z-index:50}.modal.open{display:flex}.sheet{width:min(430px,100%);max-height:90vh;overflow:auto;padding:18px;border-radius:28px 28px 0 0}.form{display:grid;gap:10px}.form label{font-size:12px;color:var(--muted)}.empty{text-align:center;padding:24px;color:var(--muted)}.hidden{display:none!important}.timer{font-size:44px;text-align:center;font-weight:700;margin:18px 0}.notice{padding:11px;border-radius:15px;background:var(--soft);font-size:13px;line-height:1.4}.sectionTitle{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.back{border:0;background:var(--soft);border-radius:13px;padding:8px 10px;cursor:pointer}.photoPreview{width:100%;max-height:220px;object-fit:cover;border-radius:18px;margin-top:8px}.switch{display:flex;gap:8px}.switch button{flex:1}.recipeText{white-space:pre-line;line-height:1.45;font-size:13px}.toast{position:fixed;left:50%;bottom:104px;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 14px;border-radius:14px;display:none;z-index:100;font-size:13px}.toast.show{display:block}.filters{display:flex;gap:7px;overflow:auto;padding:4px 0}.filterBtn{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:7px 10px;white-space:nowrap;cursor:pointer;font-size:12px}.filterBtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}.productCard{padding:13px;border:1px solid var(--line);background:var(--card);border-radius:20px}.productMeta{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-top:9px}.metaCell{padding:8px;border-radius:13px;background:var(--soft);font-size:11px}.bar{height:7px;background:var(--soft);border-radius:99px;overflow:hidden;margin-top:5px}.bar span{display:block;height:100%;background:var(--accent)}.stepProduct{font-size:11px;color:var(--muted);margin-top:2px}.scoreRow{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}.scorePill{padding:6px 8px;border-radius:999px;background:var(--soft);font-size:11px}.warningBox{padding:10px;border-radius:15px;background:#fff0df;color:#8b5d35;font-size:12px;line-height:1.35;margin-top:8px}.linkBtn{border:0;background:none;color:var(--accent2);padding:0;cursor:pointer;font-weight:700}.subtabs{display:flex;gap:6px;overflow:auto;margin-bottom:10px}.subtab{border:1px solid var(--line);background:var(--card);border-radius:13px;padding:7px 9px;white-space:nowrap;font-size:12px}.subtab.active{background:var(--soft);font-weight:700}
</style>
</head>
<body><div class="app" id="app"></div><div class="modal" id="modal"><div class="sheet"><div class="space"><h2 id="modalTitle">Добавить</h2><button class="back" onclick="closeModal()">✕</button></div><div id="modalBody"></div></div></div><div class="toast" id="toast"></div>
<script>
const ICON='icons/final/catalog/';
const I=n=>`${ICON}${String(n).padStart(3,'0')}.png`;
const todayISO=()=>new Date().toISOString().slice(0,10);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const seed={products:[{id:uid(),name:'Мягкий гель для умывания',brand:'Мой бренд',category:'Лицо',purpose:'Очищение',zone:'Лицо',opened:todayISO(),expiry:'2027-04-01',pao:12,status:'Открыто',volume:200,remaining:72,price:790,store:'Косметический магазин',actives:'Пантенол, бетаин',routineTime:'Утро и вечер',rating:5,reaction:'Нет',repurchase:true,notes:'Подходит утром и вечером'},{id:uid(),name:'SPF 50',brand:'Мой бренд',category:'Лицо',purpose:'Защита',zone:'Лицо и шея',opened:todayISO(),expiry:'2027-02-01',pao:12,status:'Заканчивается',volume:50,remaining:18,price:1290,store:'Аптека',actives:'UV-фильтры, витамин E',routineTime:'Утро',rating:4,reaction:'Нет',repurchase:true,notes:'Обновлять каждые 2–3 часа'}],routines:[{id:uid(),name:'Утренний уход',period:'Утро',days:'Ежедневно',steps:[{title:'Очищение',productId:''},{title:'Сыворотка',productId:''},{title:'Крем',productId:''},{title:'SPF',productId:''}],done:[]},{id:uid(),name:'Вечерний уход',period:'Вечер',days:'Ежедневно',steps:[{title:'Очищение',productId:''},{title:'Актив',productId:''},{title:'Крем',productId:''}],done:[]}],events:[{id:uid(),date:todayISO(),time:'20:00',title:'Вечерний уход',category:'Уход'}],workouts:[{id:uid(),date:todayISO(),title:'Осанка и лёгкая растяжка',duration:20,done:false}],meals:[],recipes:[{id:uid(),name:'Тёплый салат с курицей',ingredients:'Курица, овощи, зелень, оливковое масло',steps:'1. Обжарить курицу.\n2. Добавить овощи.\n3. Заправить и подать.'}],shopping:[{id:uid(),name:'Молоко',done:false},{id:uid(),name:'Овощи',done:false}],water:{date:todayISO(),count:5,target:8},moods:[{id:uid(),date:todayISO(),score:4,note:'Спокойный день'}],sleep:[{id:uid(),date:todayISO(),hours:7.1,quality:4}],measurements:[],cycle:{start:'2026-06-25',length:28,period:5,notes:''},skin:[{id:uid(),date:todayISO(),score:4,dryness:2,oiliness:2,sensitivity:3,redness:2,breakouts:1,cycleDay:'',products:'',photo:'',note:'Небольшая чувствительность'}],tasks:[{id:uid(),title:'Нанести SPF',category:'Уход',done:false},{id:uid(),title:'Выпить воду',category:'Баланс',done:false}],settings:{theme:'rose'}};
let db=load();let current='home',currentTab={},productFilter='Все';
function load(){try{const raw=Object.assign(structuredClone(seed),JSON.parse(localStorage.getItem('beautyDB')||'{}'));return normalizeDB(raw)}catch(e){return normalizeDB(structuredClone(seed))}}
function normalizeDB(raw){raw.products=(raw.products||[]).map(p=>Object.assign({brand:'',purpose:'',zone:p.category||'',pao:12,volume:'',remaining:100,price:'',store:'',actives:'',routineTime:'',rating:0,reaction:'Нет',repurchase:false,photo:''},p));raw.routines=(raw.routines||[]).map(r=>Object.assign({period:'',days:'Ежедневно'},r,{steps:(r.steps||[]).map(x=>typeof x==='string'?{title:x,productId:''}:x)}));raw.skin=(raw.skin||[]).map(x=>Object.assign({dryness:0,oiliness:0,sensitivity:0,redness:0,breakouts:0,cycleDay:'',products:'',photo:''},x));return raw}
function save(){localStorage.setItem('beautyDB',JSON.stringify(db));render(current);toast('Сохранено')}
function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function img(id,cls='icon'){return `<img class="${cls}" src="${I(id)}">`}
function header(title,sub,id,back='home'){return `<div class="header"><div class="space"><div><button class="back" onclick="openPage('${back}')">←</button><div class="small" style="margin-top:8px">${sub}</div><h1>${title}</h1></div>${img(id,'icon sm')}</div></div>`}
function openPage(id){current=id;render(id);window.scrollTo(0,0)}
function progress(){let all=db.tasks.length,done=db.tasks.filter(x=>x.done).length;return all?Math.round(done/all*100):0}
function cycleDay(){let start=new Date(db.cycle.start),now=new Date();let d=Math.floor((now-start)/86400000);return ((d%db.cycle.length)+db.cycle.length)%db.cycle.length+1}
function cyclePhase(day){if(day<=db.cycle.period)return 'Менструальная фаза';if(day<13)return 'Фолликулярная фаза';if(day<=15)return 'Овуляция';return 'Лютеиновая фаза'}
function render(id){document.body.classList.toggle('theme-night',db.settings.theme==='night');document.getElementById('app').innerHTML=pages[id]?pages[id]():pages.home();setNav(id)}
function nav(){return `<nav class="bottom"><div class="nav ${current==='home'?'active':''}" onclick="openPage('home')">${img(11,'')}Главная</div><div class="nav ${current==='calendar'?'active':''}" onclick="openPage('calendar')">${img(13,'')}Календарь</div><div class="nav ${current==='assistant'?'active':''}" onclick="openPage('assistant')">${img(12,'')}Ассистент</div><div class="nav ${current==='beautybag'?'active':''}" onclick="openPage('beautybag')">${img(14,'')}Косметичка</div><div class="nav ${current==='settings'?'active':''}" onclick="openPage('settings')">${img(127,'')}Настройки</div></nav>`}
function setNav(){document.getElementById('app').insertAdjacentHTML('beforeend',nav())}
function taskList(){return db.tasks.map(t=>`<div class="item"><div class="check ${t.done?'done':''}" onclick="toggleTask('${t.id}')">${t.done?'✓':''}</div><div class="grow"><b>${esc(t.title)}</b><span class="small">${esc(t.category)}</span></div><button class="mini" onclick="del('tasks','${t.id}')">✕</button></div>`).join('')||'<div class="empty">Задач пока нет</div>'}
const pages={
home:()=>{let p=progress(),cd=cycleDay();return `<main class="page active"><div class="top"><div class="card"><div class="space"><div><div class="small">${new Date().toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'})}</div><h1>Красота внутри и снаружи</h1><div class="small">Дневник ухода, здоровья и гармонии</div></div><div class="avatar">ТА</div></div><div style="margin-top:16px"><div class="space"><b>Баланс дня</b><span class="small">${p}%</span></div><div class="progress"><span style="width:${p}%"></span></div></div></div></div><section class="section"><div class="card hero" onclick="openPage('assistant')">${img(12,'heroIcon')}<div><div class="small">Бьюти-ассистент</div><h2>Собрать уход и помочь мягко</h2><div class="chips"><span class="chip">Уход на сегодня</span><span class="chip">Beauty SOS</span></div></div></div></section><section class="section"><div class="card" onclick="openPage('cycle')"><div class="space"><div><div class="small">Цикл и самочувствие</div><b>${cd}-й день · ${cyclePhase(cd)}</b></div><span class="badge">Моя терапия</span></div></div></section><section class="section"><h2>Главные пространства</h2><div class="grid"><div class="tile" onclick="openPage('beautybag')">${img(14)}<h3>Косметичка</h3><p>Средства, составы, сроки и покупки.</p></div><div class="tile" onclick="openPage('care')">${img(15)}<h3>Уход</h3><p>Лицо, тело, волосы и кожа.</p></div><div class="tile" onclick="openPage('calendar')">${img(13)}<h3>Календарь</h3><p>Процедуры, задачи и цикл.</p></div><div class="tile" onclick="openPage('balance')">${img(16)}<h3>Баланс</h3><p>Спорт, питание, сон и настроение.</p></div></div></section><section class="section"><div class="sectionTitle"><h2>Сегодня</h2><button class="mini" onclick="taskModal()">＋</button></div><div class="list">${taskList()}</div></section></main>`},
assistant:()=>`${header('Бьюти-ассистент','Персональный помощник',12)}<section class="section"><div class="card"><textarea id="ask" rows="3" placeholder="Например: собери вечерний уход из моих средств"></textarea><button class="primary" style="margin-top:8px" onclick="assistantAnswer()">Спросить</button></div></section><section class="section"><h2>Быстрые сценарии</h2><div class="taskGrid"><div class="taskCard" onclick="quickAnswer('routine')">${img(30)}<b>Уход на сегодня</b><span>Из ваших средств</span></div><div class="taskCard" onclick="quickAnswer('reaction')">${img(45)}<b>Причина реакции</b><span>Сверить дневник</span></div><div class="taskCard" onclick="quickAnswer('sos')">${img(25)}<b>Beauty SOS</b><span>Бережный минимум</span></div><div class="taskCard" onclick="quickAnswer('low')">${img(87)}<b>Нет сил</b><span>Сократить план</span></div></div></section><section class="section hidden" id="answerBox"><h2>Рекомендация</h2><div class="card recipeText" id="answer"></div></section>`,
beautybag:()=>`${header('Моя косметичка','Средства, сроки и покупки',14)}<section class="section"><div class="kpis"><div class="kpi"><b>${db.products.length}</b><span class="small">всего</span></div><div class="kpi"><b>${db.products.filter(x=>x.status==='Открыто').length}</b><span class="small">открыто</span></div><div class="kpi"><b>${db.products.filter(x=>daysTo(x.expiry)<=30||Number(x.remaining)<=20).length}</b><span class="small">требуют внимания</span></div></div><input class="search" id="productSearch" placeholder="Поиск по названию, бренду, активам" oninput="filterProducts()"><div class="filters">${['Все','Открыто','Заканчивается','Срок до 30 дней','Купить снова'].map(f=>`<button class="filterBtn ${productFilter===f?'active':''}" onclick="setProductFilter('${f}')">${f}</button>`).join('')}</div></section><section class="section"><div class="toolbar"><button class="primary" onclick="productModal()">Добавить средство</button><button class="secondary" onclick="openPage('care')">Собрать рутину</button></div></section><section class="section"><div class="list" id="productList">${productRows(filteredProducts())}</div></section>`,
care:()=>`${header('Мои рутины','Уход и состояние кожи',15)}<section class="section"><div class="tabs"><button class="tab active" onclick="careTab('routines',this)">Рутины</button><button class="tab" onclick="careTab('skin',this)">Дневник кожи</button><button class="tab" onclick="careTab('procedures',this)">Процедуры</button></div></section><section class="section" id="careBody">${routinesView()}</section>`,
calendar:()=>`${header('Календарь красоты','Все события',13)}<section class="section"><div class="card"><div class="space"><b>${new Date().toLocaleDateString('ru-RU',{month:'long',year:'numeric'})}</b><button class="mini" onclick="eventModal()">＋</button></div><div class="calendar" id="cal" style="margin-top:12px">${calendarHtml()}</div></div></section><section class="section"><div class="list">${eventRows()}</div></section>`,
balance:()=>`${header('Баланс','Тело и самочувствие',16)}<section class="section"><div class="kpis"><div class="kpi"><b>${lastSleep()}</b><span class="small">сон</span></div><div class="kpi"><b>${db.water.count}/${db.water.target}</b><span class="small">вода</span></div><div class="kpi"><b>${lastMood()}</b><span class="small">настроение</span></div></div></section><section class="section"><div class="taskGrid"><div class="taskCard" onclick="openPage('sport')">${img(54)}<b>Спорт</b><span>Тренировки и прогресс</span></div><div class="taskCard" onclick="openPage('nutrition')">${img(66)}<b>Питание</b><span>Дневник, меню, покупки</span></div><div class="taskCard" onclick="openPage('sleep')">${img(73)}<b>Сон</b><span>Режим и восстановление</span></div><div class="taskCard" onclick="openPage('mind')">${img(84)}<b>Настроение</b><span>Дыхание и дневник</span></div><div class="taskCard" onclick="openPage('measurements')">${img(57)}<b>Прогресс</b><span>Вес и измерения</span></div><div class="taskCard" onclick="openPage('cycle')">${img(95)}<b>Цикл</b><span>Фазы и самочувствие</span></div></div></section>`,
sport:()=>`${header('Спорт','Движение и восстановление',54,'balance')}<section class="section"><div class="taskGrid"><div class="taskCard" onclick="workoutModal()">${img(54)}<b>Новая тренировка</b><span>Записать план</span></div><div class="taskCard" onclick="openPage('measurements')">${img(60)}<b>Вес и измерения</b><span>Следить за динамикой</span></div><div class="taskCard" onclick="toast('Кардио добавляется как тренировка')">${img(62)}<b>Кардио</b><span>Ходьба, велосипед, бег</span></div><div class="taskCard" onclick="toast('День восстановления отмечен')">${img(77)}<b>Восстановление</b><span>Растяжка и отдых</span></div></div></section><section class="section"><h2>План тренировок</h2><div class="list">${workoutRows()}</div></section>`,
nutrition:()=>`${header('Питание','Дневник и меню',66,'balance')}<section class="section"><div class="tabs"><button class="tab active" onclick="nutritionTab('diary',this)">Дневник</button><button class="tab" onclick="nutritionTab('recipes',this)">Рецепты</button><button class="tab" onclick="nutritionTab('menu',this)">Меню</button><button class="tab" onclick="nutritionTab('shopping',this)">Покупки</button><button class="tab" onclick="nutritionTab('water',this)">Вода</button></div></section><section class="section" id="nutritionBody">${mealView()}</section>`,
sleep:()=>`${header('Сон и режим','Восстановление',87,'balance')}<section class="section"><button class="primary" onclick="sleepModal()">Добавить запись</button></section><section class="section"><div class="list">${db.sleep.slice().reverse().map(x=>`<div class="item">${img(87,'')}<div class="grow"><b>${x.hours} ч · качество ${x.quality}/5</b><span class="small">${x.date}</span></div><button class="mini" onclick="del('sleep','${x.id}')">✕</button></div>`).join('')}</div></section>`,
mind:()=>`${header('Настроение и дыхание','Ментальное здоровье',80,'balance')}<section class="section"><div class="taskGrid"><div class="taskCard" onclick="moodModal()">${img(80)}<b>Дневник настроения</b><span>Оценка и заметка</span></div><div class="taskCard" onclick="breathingModal()">${img(85)}<b>Дыхание 4–7–8</b><span>Мягкая практика</span></div><div class="taskCard" onclick="affirmation()">${img(53)}<b>Аффирмация</b><span>Поддержка на сегодня</span></div><div class="taskCard" onclick="noteModal()">${img(82)}<b>Мысли</b><span>Свободная запись</span></div></div></section><section class="section"><h2>История настроения</h2><div class="list">${db.moods.slice().reverse().map(x=>`<div class="item"><div class="badge">${'★'.repeat(x.score)}</div><div class="grow"><b>${esc(x.note||'Без заметки')}</b><span class="small">${x.date}</span></div><button class="mini" onclick="del('moods','${x.id}')">✕</button></div>`).join('')}</div></section>`,
measurements:()=>`${header('Прогресс','Вес и измерения',58,'balance')}<section class="section"><button class="primary" onclick="measurementModal()">Добавить измерение</button></section><section class="section"><div class="list">${db.measurements.slice().reverse().map(x=>`<div class="item">${img(58,'')}<div class="grow"><b>${x.weight?x.weight+' кг':''}${x.waist?' · талия '+x.waist+' см':''}</b><span class="small">${x.date} ${esc(x.note||'')}</span></div><button class="mini" onclick="del('measurements','${x.id}')">✕</button></div>`).join('')||'<div class="empty">Добавьте первое измерение</div>'}</div></section>`,
cycle:()=>{let d=cycleDay();return `${header('Цикл и самочувствие','Женское здоровье',95)}<section class="section"><div class="card"><div class="space"><div><b>${d}-й день цикла</b><div class="small">${cyclePhase(d)}</div></div><span class="badge">${db.cycle.length} дней</span></div><div class="progress"><span style="width:${Math.round(d/db.cycle.length*100)}%"></span></div></div></section><section class="section"><button class="primary" onclick="cycleModal()">Настроить цикл</button></section><section class="section"><div class="notice">Ассистент использует фазу цикла только для мягкой корректировки нагрузки и ухода. Медицинские назначения остаются в приложении «Моя терапия».</div></section>`},
settings:()=>`${header('Настройки','Данные и оформление',127)}<section class="section"><div class="card"><h2>Оформление</h2><div class="switch"><button class="secondary" onclick="setTheme('rose')">Светлая</button><button class="secondary" onclick="setTheme('night')">Ночная</button></div></div></section><section class="section"><div class="card"><h2>Данные</h2><div class="form"><button class="secondary" onclick="exportData()">Экспортировать резервную копию</button><label class="secondary" style="text-align:center;cursor:pointer">Импортировать<input type="file" accept="application/json" class="hidden" onchange="importData(event)"></label><button class="dangerBtn" onclick="resetData()">Очистить данные</button></div></div></section><section class="section"><div class="notice">Все записи сохраняются локально на устройстве. Интернет для основных функций не требуется.</div></section>`
};
function daysTo(date){if(!date)return 99999;return Math.ceil((new Date(date)-new Date(todayISO()))/86400000)}
function expiryText(x){let d=daysTo(x.expiry);if(d<0)return `Просрочено ${Math.abs(d)} дн.`;if(d<=30)return `До срока ${d} дн.`;return x.expiry||'Срок не указан'}
function filteredProducts(){let q=(document.getElementById('productSearch')?.value||'').toLowerCase();return db.products.filter(x=>{let text=[x.name,x.brand,x.category,x.purpose,x.actives,x.notes].join(' ').toLowerCase();let ok=!q||text.includes(q);if(productFilter==='Открыто')ok=ok&&x.status==='Открыто';if(productFilter==='Заканчивается')ok=ok&&(x.status==='Заканчивается'||Number(x.remaining)<=20);if(productFilter==='Срок до 30 дней')ok=ok&&daysTo(x.expiry)<=30;if(productFilter==='Купить снова')ok=ok&&(x.status==='Купить снова'||x.repurchase===true||x.repurchase==='on');return ok})}
function setProductFilter(f){productFilter=f;render('beautybag')}
function productRows(arr){return arr.map(x=>{let warn=daysTo(x.expiry)<=30||Number(x.remaining)<=20;return `<div class="productCard"><div class="item" style="padding:0;border:0">${img(128,'')}<div class="grow"><b>${esc(x.name)}</b><span class="small">${esc(x.brand||'Без бренда')} · ${esc(x.category||'Без категории')}<br>${esc(x.purpose||'Назначение не указано')}</span></div><span class="badge ${warn?'warn':'ok'}">${warn?'Проверить':'В порядке'}</span></div><div class="productMeta"><div class="metaCell"><b>Остаток</b><div class="bar"><span style="width:${Math.max(0,Math.min(100,Number(x.remaining)||0))}%"></span></div>${Number(x.remaining)||0}%</div><div class="metaCell"><b>Срок</b>${expiryText(x)}</div><div class="metaCell"><b>Активы</b>${esc(x.actives||'—')}</div><div class="metaCell"><b>Рутина</b>${esc(x.routineTime||'—')}</div></div>${x.reaction&&x.reaction!=='Нет'?`<div class="warningBox">Реакция: ${esc(x.reaction)}</div>`:''}<div class="toolbar"><button class="secondary" onclick="showProduct('${x.id}')">Карточка</button><button class="secondary" onclick="productModal('${x.id}')">Изменить</button><button class="secondary" onclick="del('products','${x.id}')">Удалить</button></div></div>`}).join('')||'<div class="empty">Средств пока нет</div>'}
function filterProducts(){document.getElementById('productList').innerHTML=productRows(filteredProducts())}
function productOptions(selected=''){return `<option value="">Без привязки</option>`+db.products.map(p=>`<option value="${p.id}" ${selected===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}
function routinesView(){return `<div class="notice">Этапы можно связать со средствами из косметички. Выполнение сохраняется отдельно для каждой рутины.</div><button class="primary" style="margin-top:10px" onclick="routineModal()">Добавить рутину</button><div class="list" style="margin-top:11px">${db.routines.map(r=>`<div class="card"><div class="space"><div><b>${esc(r.name)}</b><div class="small">${esc(r.period||'')} · ${esc(r.days||'')}</div></div><div class="actions"><button class="mini" onclick="routineModal('${r.id}')">✎</button><button class="mini" onclick="del('routines','${r.id}')">✕</button></div></div>${r.steps.map((s,i)=>{let p=db.products.find(x=>x.id===s.productId);return `<div class="item"><div class="check ${r.done.includes(i)?'done':''}" onclick="toggleRoutine('${r.id}',${i})">${r.done.includes(i)?'✓':''}</div><div class="grow"><b>${esc(s.title)}</b><div class="stepProduct">${p?esc(p.name):'Средство не привязано'}</div></div></div>`}).join('')}<div class="small" style="margin-top:8px">Выполнено ${r.done.length} из ${r.steps.length}</div></div>`).join('')||'<div class="empty">Рутин пока нет</div>'}</div>`}
function skinView(){return `<div class="notice">Отмечайте ощущения и средства, использованные в этот день. Это поможет находить наблюдаемые связи.</div><button class="primary" style="margin-top:10px" onclick="skinModal()">Добавить состояние кожи</button><div class="list" style="margin-top:11px">${db.skin.slice().reverse().map(x=>`<div class="productCard"><div class="item" style="padding:0;border:0">${img(18,'')}<div class="grow"><b>${x.date} · состояние ${x.score}/5</b><span class="small">${esc(x.note||'Без заметки')}</span></div><div class="actions"><button class="mini" onclick="skinModal('${x.id}')">✎</button><button class="mini" onclick="del('skin','${x.id}')">✕</button></div></div><div class="scoreRow"><span class="scorePill">Сухость ${x.dryness||0}/5</span><span class="scorePill">Жирность ${x.oiliness||0}/5</span><span class="scorePill">Чувствительность ${x.sensitivity||0}/5</span><span class="scorePill">Покраснение ${x.redness||0}/5</span><span class="scorePill">Высыпания ${x.breakouts||0}/5</span></div>${x.products?`<div class="small">Средства: ${esc(x.products)}</div>`:''}</div>`).join('')||'<div class="empty">Записей пока нет</div>'}</div>`}
function proceduresView(){return `<div class="notice">Процедуры сохраняются в общем календаре. Добавьте событие с категорией «Процедура».</div><button class="primary" style="margin-top:10px" onclick="eventModal('Процедура')">Добавить процедуру</button>`}
function careTab(tab,el){el.parentElement.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));el.classList.add('active');document.getElementById('careBody').innerHTML=tab==='routines'?routinesView():tab==='skin'?skinView():proceduresView()}
function calendarHtml(){let now=new Date(),y=now.getFullYear(),m=now.getMonth(),days=new Date(y,m+1,0).getDate();let out='';for(let i=1;i<=days;i++){let iso=`${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`,has=db.events.some(e=>e.date===iso);out+=`<div class="day ${iso===todayISO()?'active':''} ${has?'has':''}" onclick="showDay('${iso}')">${i}</div>`}return out}
function eventRows(date){let a=db.events.filter(x=>!date||x.date===date).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));return a.map(x=>`<div class="item">${img(90,'')}<div class="grow"><b>${esc(x.title)}</b><span class="small">${x.date} ${x.time||''} · ${esc(x.category)}</span></div><button class="mini" onclick="eventModal('', '${x.id}')">✎</button><button class="mini" onclick="del('events','${x.id}')">✕</button></div>`).join('')||'<div class="empty">Событий нет</div>'}
function showDay(d){openModal('События '+d,`<div class="list">${eventRows(d)}</div><button class="primary" style="margin-top:10px" onclick="closeModal();eventModal('',null,'${d}')">Добавить событие</button>`)}
function workoutRows(){return db.workouts.slice().reverse().map(x=>`<div class="item"><div class="check ${x.done?'done':''}" onclick="toggleWorkout('${x.id}')">${x.done?'✓':''}</div><div class="grow"><b>${esc(x.title)}</b><span class="small">${x.date} · ${x.duration} минут</span></div><button class="mini" onclick="del('workouts','${x.id}')">✕</button></div>`).join('')||'<div class="empty">Тренировок пока нет</div>'}
function mealView(){return `<button class="primary" onclick="mealModal()">Добавить приём пищи</button><div class="list" style="margin-top:11px">${db.meals.slice().reverse().map(x=>`<div class="item">${img(66,'')}<div class="grow"><b>${esc(x.title)}</b><span class="small">${x.date} · ${x.type}${x.note?' · '+esc(x.note):''}</span></div><button class="mini" onclick="del('meals','${x.id}')">✕</button></div>`).join('')||'<div class="empty">Записей пока нет</div>'}</div>`}
function recipesView(){return `<button class="primary" onclick="recipeModal()">Добавить рецепт</button><div class="list" style="margin-top:11px">${db.recipes.map(x=>`<div class="item">${img(67,'')}<div class="grow"><b>${esc(x.name)}</b><span class="small">${esc(x.ingredients)}</span></div><button class="mini" onclick="showRecipe('${x.id}')">Открыть</button><button class="mini" onclick="del('recipes','${x.id}')">✕</button></div>`).join('')}</div>`}
function menuView(){let meals=db.meals.filter(x=>x.date===todayISO());return `<div class="card"><h2>Меню на сегодня</h2>${['Завтрак','Обед','Ужин','Перекус'].map(t=>{let x=meals.find(m=>m.type===t);return `<div class="item"><b style="width:72px">${t}</b><span class="small">${x?esc(x.title):'не запланировано'}</span></div>`}).join('')}</div>`}
function shoppingView(){return `<div class="toolbar"><input id="shopName" placeholder="Новый продукт"><button class="primary" onclick="addShopping()">＋</button></div><div class="list" style="margin-top:11px">${db.shopping.map(x=>`<div class="item"><div class="check ${x.done?'done':''}" onclick="toggleShopping('${x.id}')">${x.done?'✓':''}</div><div class="grow"><b>${esc(x.name)}</b></div><button class="mini" onclick="del('shopping','${x.id}')">✕</button></div>`).join('')}</div>`}
function waterView(){if(db.water.date!==todayISO())db.water={date:todayISO(),count:0,target:8};return `<div class="card"><div class="space"><div><b>${db.water.count} из ${db.water.target} стаканов</b><div class="small">Нажимайте на капли</div></div>${img(70,'icon sm')}</div><div class="water" style="margin-top:14px">${Array.from({length:db.water.target},(_,i)=>`<div class="drop ${i<db.water.count?'filled':''}" onclick="setWater(${i+1})"><span>${i+1}</span></div>`).join('')}</div></div>`}
function nutritionTab(tab,el){el.parentElement.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));el.classList.add('active');document.getElementById('nutritionBody').innerHTML=tab==='diary'?mealView():tab==='recipes'?recipesView():tab==='menu'?menuView():tab==='shopping'?shoppingView():waterView()}
function lastSleep(){let x=db.sleep.at(-1);return x?x.hours+' ч':'—'}function lastMood(){let x=db.moods.at(-1);return x?x.score+'/5':'—'}
function openModal(title,body){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=body;document.getElementById('modal').classList.add('open')}function closeModal(){document.getElementById('modal').classList.remove('open')}
function form(id,fields,submit,label='Сохранить'){openModal(label,`<form class="form" id="${id}" onsubmit="event.preventDefault();${submit}">${fields}<button class="primary" type="submit">${label}</button></form>`)}
const fld=(label,name,type='text',value='',extra='')=>`<label>${label}<input name="${name}" type="${type}" value="${esc(value)}" ${extra}></label>`;
function productModal(id){let x=db.products.find(a=>a.id===id)||{};form('fProduct',`${fld('Название','name','text',x.name||'','required')}${fld('Бренд','brand','text',x.brand||'')}${fld('Категория','category','text',x.category||'Лицо')}${fld('Назначение','purpose','text',x.purpose||'')}${fld('Зона применения','zone','text',x.zone||'')}${fld('Активные компоненты','actives','text',x.actives||'')}${fld('Дата открытия','opened','date',x.opened||todayISO())}${fld('Срок годности','expiry','date',x.expiry||'')}${fld('Срок после вскрытия, мес.','pao','number',x.pao||12,'min="1" max="60"')}${fld('Объём','volume','number',x.volume||'','min="0" step="0.1"')}${fld('Остаток, %','remaining','number',x.remaining??100,'min="0" max="100"')}${fld('Цена','price','number',x.price||'','min="0" step="0.01"')}${fld('Магазин','store','text',x.store||'')}${fld('Когда использовать','routineTime','text',x.routineTime||'')}<label>Статус<select name="status">${['Открыто','Заканчивается','Запечатано','Купить снова','Закончилось'].map(v=>`<option ${x.status===v?'selected':''}>${v}</option>`).join('')}</select></label><label>Оценка<select name="rating">${[0,1,2,3,4,5].map(v=>`<option value="${v}" ${Number(x.rating)===v?'selected':''}>${v||'Не оценено'}</option>`).join('')}</select></label><label>Реакция<select name="reaction">${['Нет','Сухость','Покраснение','Жжение','Высыпания','Другое'].map(v=>`<option ${x.reaction===v?'selected':''}>${v}</option>`).join('')}</select></label><label><input type="checkbox" name="repurchase" ${x.repurchase===true||x.repurchase==='on'?'checked':''}> Купить снова</label><label>Заметки<textarea name="notes">${esc(x.notes||'')}</textarea></label>`,`saveProduct('${id||''}')`,'Сохранить средство')}
function saveProduct(id){let o=Object.fromEntries(new FormData(document.getElementById('fProduct')));['pao','volume','remaining','price','rating'].forEach(k=>o[k]=o[k]===''?'':Number(o[k]));o.repurchase=document.querySelector('#fProduct [name=repurchase]').checked;o.id=id||uid();let i=db.products.findIndex(x=>x.id===o.id);if(i>=0)db.products[i]=o;else db.products.push(o);closeModal();save()}
function showProduct(id){let x=db.products.find(a=>a.id===id);if(!x)return;openModal(x.name,`<div class="notice"><b>${esc(x.brand||'Без бренда')}</b><br>${esc(x.category||'')} · ${esc(x.zone||'')}</div><div class="productMeta"><div class="metaCell"><b>Назначение</b>${esc(x.purpose||'—')}</div><div class="metaCell"><b>Остаток</b>${x.remaining??'—'}%</div><div class="metaCell"><b>Срок</b>${expiryText(x)}</div><div class="metaCell"><b>После вскрытия</b>${x.pao||'—'} мес.</div><div class="metaCell"><b>Активы</b>${esc(x.actives||'—')}</div><div class="metaCell"><b>Когда использовать</b>${esc(x.routineTime||'—')}</div><div class="metaCell"><b>Цена</b>${x.price?x.price+' ₽':'—'}</div><div class="metaCell"><b>Магазин</b>${esc(x.store||'—')}</div></div>${x.notes?`<div class="notice" style="margin-top:10px">${esc(x.notes)}</div>`:''}<div class="toolbar"><button class="secondary" onclick="closeModal();productModal('${x.id}')">Изменить</button><button class="secondary" onclick="closeModal();openPage('care')">К рутинам</button></div>`)}
function routineModal(id){let r=db.routines.find(x=>x.id===id)||{steps:[{title:'',productId:''}]};let steps=(r.steps||[]).map((s,i)=>`<div class="card" style="padding:10px"><label>Этап ${i+1}<input name="stepTitle" value="${esc(s.title||'')}" required></label><label>Средство<select name="stepProduct">${productOptions(s.productId||'')}</select></label></div>`).join('');form('fRoutine',`${fld('Название','name','text',r.name||'','required')}<label>Период<select name="period">${['Утро','Вечер','Еженедельно','Особый режим'].map(v=>`<option ${r.period===v?'selected':''}>${v}</option>`).join('')}</select></label>${fld('Дни','days','text',r.days||'Ежедневно')}<div id="routineSteps">${steps}</div><button type="button" class="secondary" onclick="addRoutineStep()">＋ Добавить этап</button>`,`saveRoutine('${id||''}')`,'Сохранить рутину')}
function addRoutineStep(){document.getElementById('routineSteps').insertAdjacentHTML('beforeend',`<div class="card" style="padding:10px"><label>Новый этап<input name="stepTitle" required></label><label>Средство<select name="stepProduct">${productOptions()}</select></label></div>`)}
function saveRoutine(id){let f=document.getElementById('fRoutine'),fd=new FormData(f),titles=[...f.querySelectorAll('[name=stepTitle]')],products=[...f.querySelectorAll('[name=stepProduct]')];let o={id:id||uid(),name:fd.get('name'),period:fd.get('period'),days:fd.get('days'),steps:titles.map((e,i)=>({title:e.value,productId:products[i].value})).filter(x=>x.title.trim()),done:[]};let i=db.routines.findIndex(x=>x.id===o.id);if(i>=0){o.done=db.routines[i].done.filter(n=>n<o.steps.length);db.routines[i]=o}else db.routines.push(o);closeModal();save()}
function skinModal(id){let x=db.skin.find(a=>a.id===id)||{};form('fSkin',`${fld('Дата','date','date',x.date||todayISO())}${fld('Общее состояние 1–5','score','number',x.score||4,'min="1" max="5"')}${fld('Сухость 0–5','dryness','number',x.dryness||0,'min="0" max="5"')}${fld('Жирность 0–5','oiliness','number',x.oiliness||0,'min="0" max="5"')}${fld('Чувствительность 0–5','sensitivity','number',x.sensitivity||0,'min="0" max="5"')}${fld('Покраснение 0–5','redness','number',x.redness||0,'min="0" max="5"')}${fld('Высыпания 0–5','breakouts','number',x.breakouts||0,'min="0" max="5"')}${fld('День цикла','cycleDay','number',x.cycleDay||'','min="1" max="60"')}${fld('Использованные средства','products','text',x.products||'')}<label>Заметка<textarea name="note">${esc(x.note||'')}</textarea></label>`,`saveSkin('${id||''}')`,'Сохранить')}
function saveSkin(id){let o=Object.fromEntries(new FormData(document.getElementById('fSkin')));['score','dryness','oiliness','sensitivity','redness','breakouts','cycleDay'].forEach(k=>o[k]=o[k]===''?'':Number(o[k]));o.id=id||uid();let i=db.skin.findIndex(x=>x.id===o.id);if(i>=0)db.skin[i]=o;else db.skin.push(o);closeModal();save()}
function eventModal(category='',id=null,date=todayISO()){let x=db.events.find(a=>a.id===id)||{};form('fEvent',`${fld('Название','title','text',x.title||'','required')}${fld('Дата','date','date',x.date||date)}${fld('Время','time','time',x.time||'10:00')}<label>Категория<select name="category">${['Уход','Процедура','Спорт','Питание','Цикл','Личное'].map(c=>`<option ${(x.category||category)===c?'selected':''}>${c}</option>`).join('')}</select></label>`,`saveForm('events',id,'fEvent')`,'Сохранить событие')}
function workoutModal(){form('fWorkout',`${fld('Тренировка','title','text','','required')}${fld('Дата','date','date',todayISO())}${fld('Длительность, минут','duration','number','30','min="1"')}`,`saveForm('workouts',null,'fWorkout')`,'Добавить тренировку')}
function mealModal(){form('fMeal',`${fld('Блюдо','title','text','','required')}${fld('Дата','date','date',todayISO())}<label>Тип<select name="type"><option>Завтрак</option><option>Обед</option><option>Ужин</option><option>Перекус</option></select></label><label>Заметка<textarea name="note"></textarea></label>`,`saveForm('meals',null,'fMeal')`,'Добавить')}
function recipeModal(){form('fRecipe',`${fld('Название','name','text','','required')}<label>Ингредиенты<textarea name="ingredients" required></textarea></label><label>Приготовление<textarea name="steps" rows="5" required></textarea></label>`,`saveForm('recipes',null,'fRecipe')`,'Добавить рецепт')}
function sleepModal(){form('fSleep',`${fld('Дата','date','date',todayISO())}${fld('Часы сна','hours','number','7.5','step="0.1" min="0" max="24"')}${fld('Качество 1–5','quality','number','4','min="1" max="5"')}`,`saveForm('sleep',null,'fSleep')`,'Сохранить сон')}
function moodModal(){form('fMood',`${fld('Дата','date','date',todayISO())}${fld('Настроение 1–5','score','number','4','min="1" max="5"')}<label>Что чувствуете<textarea name="note"></textarea></label>`,`saveForm('moods',null,'fMood')`,'Сохранить')}
function measurementModal(){form('fMeasure',`${fld('Дата','date','date',todayISO())}${fld('Вес, кг','weight','number','','step="0.1"')}${fld('Талия, см','waist','number','','step="0.1"')}<label>Заметка<textarea name="note"></textarea></label>`,`saveForm('measurements',null,'fMeasure')`,'Сохранить')}
function cycleModal(){form('fCycle',`${fld('Первый день последней менструации','start','date',db.cycle.start)}${fld('Средняя длина цикла','length','number',db.cycle.length,'min="15" max="60"')}${fld('Длительность менструации','period','number',db.cycle.period,'min="1" max="15"')}<label>Заметки<textarea name="notes">${esc(db.cycle.notes||'')}</textarea></label>`,`saveCycle()`,'Сохранить')}
function taskModal(){form('fTask',`${fld('Задача','title','text','','required')}${fld('Категория','category','text','Уход')}`,`saveForm('tasks',null,'fTask')`,'Добавить задачу')}
function noteModal(){form('fNote',`<label>Запись<textarea name="note" rows="6" required></textarea></label>`,`saveNote()`,'Сохранить мысль')}
function breathingModal(){openModal('Дыхание 4–7–8',`<div class="notice">Вдох 4 секунды · задержка 7 · выдох 8. Повторите 4 цикла.</div><div class="timer" id="timer">00:00</div><button class="primary" onclick="startBreathing()">Начать</button>`)}
function saveForm(key,id,formId){return `(()=>{const o=Object.fromEntries(new FormData(document.getElementById('${formId}')));${key==='workouts'?'o.duration=Number(o.duration);o.done=false;':''}${['skin','moods'].includes(key)?'o.score=Number(o.score);':''}${key==='sleep'?'o.hours=Number(o.hours);o.quality=Number(o.quality);':''}${key==='measurements'?'o.weight=o.weight?Number(o.weight):null;o.waist=o.waist?Number(o.waist):null;':''}o.id='${id||''}'||uid();const i=db.${key}.findIndex(x=>x.id===o.id);if(i>=0)db.${key}[i]=o;else db.${key}.push(o);closeModal();save()})()`}
function saveCycle(){let f=Object.fromEntries(new FormData(document.getElementById('fCycle')));db.cycle={start:f.start,length:Number(f.length),period:Number(f.period),notes:f.notes};closeModal();save()}
function saveNote(){let n=new FormData(document.getElementById('fNote')).get('note');db.moods.push({id:uid(),date:todayISO(),score:lastMood()==='—'?3:Number(lastMood()[0]),note:n});closeModal();save()}
function del(key,id){db[key]=db[key].filter(x=>x.id!==id);save()}function toggleTask(id){let x=db.tasks.find(x=>x.id===id);x.done=!x.done;save()}function toggleRoutine(id,i){let r=db.routines.find(x=>x.id===id);r.done=r.done.includes(i)?r.done.filter(x=>x!==i):[...r.done,i];save()}function toggleWorkout(id){let x=db.workouts.find(x=>x.id===id);x.done=!x.done;save()}function toggleShopping(id){let x=db.shopping.find(x=>x.id===id);x.done=!x.done;save()}function addShopping(){let e=document.getElementById('shopName');if(!e.value.trim())return;db.shopping.push({id:uid(),name:e.value.trim(),done:false});save()}function setWater(n){db.water={date:todayISO(),count:n,target:db.water.target};save()}
function showRecipe(id){let x=db.recipes.find(x=>x.id===id);openModal(x.name,`<h3>Ингредиенты</h3><div class="recipeText">${esc(x.ingredients)}</div><h3>Приготовление</h3><div class="recipeText">${esc(x.steps)}</div>`)}
function assistantText(type,q=''){let product=db.products.filter(x=>x.status==='Открыто').map(x=>x.name).slice(0,4).join(', ');if(type==='routine'||/уход/i.test(q))return `Бережный план на сегодня:\n1. Мягкое очищение.\n2. Увлажняющий этап.\n3. Крем.\n4. Днём SPF.\n\nИз открытых средств можно проверить: ${product||'добавьте средства в косметичку'}. Не вводите несколько новых активов одновременно.`;if(type==='reaction'||/реакц|раздраж/i.test(q))return `Проверьте последние изменения: новые средства, активы, процедуры, солнце, стресс и фазу цикла. На 48–72 часа оставьте мягкое очищение, базовый крем и SPF. При выраженном отёке, боли или ухудшении обратитесь к врачу.`;if(type==='sos')return `Beauty SOS: прохладный компресс, мягкое очищение, нейтральный увлажняющий крем, без кислот и ретиноидов. Не тестируйте новые средства сегодня.`;if(type==='low')return `Минимум без чувства вины: очищение, крем, SPF утром. Вечером — очищение и крем. Остальные задачи можно перенести.`;return `Я учла вашу косметичку, календарь, цикл и записи самочувствия. Уточните зону, симптом и когда он появился — тогда план будет точнее.`}
function quickAnswer(t){document.getElementById('answerBox').classList.remove('hidden');document.getElementById('answer').textContent=assistantText(t)}function assistantAnswer(){let q=document.getElementById('ask').value;document.getElementById('answerBox').classList.remove('hidden');document.getElementById('answer').textContent=assistantText('',q)}
function affirmation(){let a=['Я могу заботиться о себе без спешки.','Маленькие действия тоже считаются.','Моё тело заслуживает бережного отношения.','Сегодня достаточно сделать посильное.'];openModal('Аффирмация',`<div class="card" style="font-size:20px;text-align:center;line-height:1.45">${a[Math.floor(Math.random()*a.length)]}</div>`)}
let timerInt;function startBreathing(){clearInterval(timerInt);let t=0,total=76;let el=document.getElementById('timer');timerInt=setInterval(()=>{t++;let phase=t%19;el.textContent=phase<=4?'Вдох':phase<=11?'Задержка':'Выдох';if(t>=total){clearInterval(timerInt);el.textContent='Готово'}},1000)}
function setTheme(t){db.settings.theme=t;save()}function exportData(){let b=new Blob([JSON.stringify(db,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='krasota-backup.json';a.click();URL.revokeObjectURL(a.href)}function importData(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{db=JSON.parse(r.result);save()}catch{toast('Файл не распознан')}};r.readAsText(f)}function resetData(){if(confirm('Удалить все записи?')){db=structuredClone(seed);save()}}function toast(s){let e=document.getElementById('toast');e.textContent=s;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1800)}
render('home');
</script></body></html>
